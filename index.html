<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no" />
    <title>Den Chat — P2P Мессенджер</title>
    <meta name="description" content="Den Chat — децентрализованный P2P мессенджер с голосовыми звонками без серверов" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <style>
      /* Critical CSS - загружается сразу */
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #020617;
        font-family: system-ui, -apple-system, sans-serif;
      }
      /* Preloader */
      #preloader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #020617;
        z-index: 9999;
        gap: 16px;
      }
      #preloader.hidden { display: none; }
      .loader {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(99, 102, 241, 0.2);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="preloader">
      <div class="loader"></div>
      <div style="color: #94a3b8; font-size: 14px;">Загрузка...</div>
    </div>
    <div id="root"></div>
    <script>
      // Убираем прелоадер когда React загрузился
      window.addEventListener('load', function() {
        setTimeout(function() {
          var preloader = document.getElementById('preloader');
          if (preloader) preloader.classList.add('hidden');
        }, 100);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
