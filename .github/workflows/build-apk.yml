name: Build Den Chat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java FIRST
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor packages
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest
          npm install @capacitor/android@latest
          npm install @capacitor/local-notifications@latest
          npm install @capacitor/haptics@latest
          npm install @capacitor/status-bar@latest
          npm install @capacitor/splash-screen@latest

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor with Android
        run: npx cap sync android

      - name: Add Android permissions to Manifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Add permissions before closing manifest tag
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n</manifest>|' $MANIFEST

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Check APK exists
        run: |
          find android -name "*.apk" -type f
          ls -la android/app/build/outputs/apk/debug/ || echo "Debug APK not found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DenChat-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
